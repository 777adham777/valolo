name: Gerer Les Joueurs Suivis

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Commande a executer"
        required: true
        type: choice
        options:
          - add
          - remove
          - list
      riot_id:
        description: "Riot ID, par exemple TenZ#NA1"
        required: false
        type: string
      region:
        description: "Region : ap, br, eu, kr, latam, na"
        required: false
        type: string
      display_name:
        description: "Nom affiche optionnel a l'ajout"
        required: false
        type: string

permissions:
  contents: read

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Valider les entrees add/remove
        if: ${{ inputs.action != 'list' }}
        shell: bash
        env:
          RIOT_ID: ${{ inputs.riot_id }}
          REGION: ${{ inputs.region }}
        run: |
          if [ -z "$RIOT_ID" ] || [ -z "$REGION" ]; then
            echo "riot_id and region are required for add/remove" >&2
            exit 1
          fi

      - name: Ajouter un joueur
        if: ${{ inputs.action == 'add' }}
        run: npm run tracker:add-player -- "$RIOT_ID" "$REGION" "$DISPLAY_NAME"
        env:
          RIOT_ID: ${{ inputs.riot_id }}
          REGION: ${{ inputs.region }}
          DISPLAY_NAME: ${{ inputs.display_name }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HENRIKDEV_API_KEY: ${{ secrets.HENRIKDEV_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          LEADERBOARD_TIMEZONE: Europe/Paris

      - name: Retirer un joueur
        if: ${{ inputs.action == 'remove' }}
        run: npm run tracker:remove-player -- "$RIOT_ID" "$REGION"
        env:
          RIOT_ID: ${{ inputs.riot_id }}
          REGION: ${{ inputs.region }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HENRIKDEV_API_KEY: ${{ secrets.HENRIKDEV_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          LEADERBOARD_TIMEZONE: Europe/Paris

      - name: Lister les joueurs
        if: ${{ inputs.action == 'list' }}
        run: npm run tracker:list-players
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HENRIKDEV_API_KEY: ${{ secrets.HENRIKDEV_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          LEADERBOARD_TIMEZONE: Europe/Paris
