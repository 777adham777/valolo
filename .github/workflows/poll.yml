name: Verifier Les Matchs Valorant

on:
  schedule:
    - cron: "*/5 * * * *"
      timezone: "Europe/Paris"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: valorant-tracker-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    # Marge pour absorber les attentes de reset du rate limit HenrikDev (jusqu'a ~70s par 429).
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tracker runtime
        uses: ./.github/actions/setup-tracker
        with:
          cache-key: ${{ runner.os }}-node22-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Verifier les nouveaux matchs
        run: npm run tracker:poll
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HENRIKDEV_API_KEY: ${{ secrets.HENRIKDEV_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          LEADERBOARD_TIMEZONE: Europe/Paris
