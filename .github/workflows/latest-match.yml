name: Envoyer Le Dernier Match

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: valorant-tracker-latest-match
  cancel-in-progress: false

jobs:
  latest-match:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Envoyer le dernier match
        run: npm run tracker:latest-match
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HENRIKDEV_API_KEY: ${{ secrets.HENRIKDEV_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          LEADERBOARD_TIMEZONE: Europe/Paris
