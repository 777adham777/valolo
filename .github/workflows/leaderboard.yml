name: Envoyer Le Classement Quotidien

on:
  schedule:
    - cron: "0 19 * * *"
      timezone: "Europe/Paris"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: valorant-tracker-leaderboard
  cancel-in-progress: false

jobs:
  leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Envoyer le classement
        run: npm run tracker:leaderboard
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          HENRIKDEV_API_KEY: ${{ secrets.HENRIKDEV_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          LEADERBOARD_TIMEZONE: Europe/Paris
